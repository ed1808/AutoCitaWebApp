services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autocita-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=autocita;Username=postgres;Password=postgres"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - autocita-network
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    container_name: autocita-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autocita
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autocita"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - autocita-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  autocita-network:
    driver: bridge
